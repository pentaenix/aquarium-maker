<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#edf2f4" />
    <meta name="description" content="Design, preview, and export a game-ready public aquarium directly in your browser." />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Aquarium Studio</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand" aria-label="Aquarium Studio">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
            <rect x="4" y="7" width="24" height="18" rx="5" />
            <path d="M6 18c5-3 9 3 14 0 3-2 5-1 7 0" />
          </svg>
          <div>
            <strong>Aquarium Studio</strong>
            <span>Game-ready GLB generator</span>
          </div>
        </div>
        <div class="topbar-stats" aria-live="polite">
          <span id="dimension-stat">—</span>
          <span id="triangle-stat">— triangles</span>
        </div>
        <div class="topbar-actions">
          <button class="button button-quiet" id="share-button" type="button" title="Copy a link to these settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.7 13.9 15.3 10M8.7 10.1l6.6 3.8M6 15.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm12-12a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm0 12a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z" /></svg>
            <span>Share</span>
          </button>
          <button class="button button-quiet" id="reset-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 8.2A8 8 0 1 1 4 14M4.8 8.2V3.8m0 4.4h4.4" /></svg>
            <span>Reset</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="viewport" aria-label="Interactive aquarium preview">
          <canvas id="viewer"></canvas>
          <div class="viewer-hint" id="viewer-hint">Drag to orbit · Scroll to zoom</div>
          <div class="viewer-toolbar" role="toolbar" aria-label="Camera controls">
            <button type="button" data-view="iso" class="is-active" title="Isometric view">Iso</button>
            <button type="button" data-view="front" title="Front view">Front</button>
            <button type="button" data-view="side" title="Side view">Side</button>
            <button type="button" data-view="top" title="Top view">Top</button>
            <span class="toolbar-separator"></span>
            <button type="button" data-view="fit" title="Frame model">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H4v4m12-4h4v4M8 20H4v-4m12 4h4v-4" /></svg>
            </button>
          </div>
          <div class="viewer-badge">Preview uses authored meters</div>
        </section>

        <aside class="panel" aria-label="Aquarium settings">
          <div class="panel-scroll" id="control-panel"></div>
          <div class="panel-footer">
            <div class="export-name-row">
              <label for="file-name">File name</label>
              <div class="file-input-wrap">
                <input id="file-name" type="text" value="public-aquarium" spellcheck="false" autocomplete="off" />
                <span>.glb</span>
              </div>
            </div>
            <button class="download-button" id="download-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11m0 0 4-4m-4 4-4-4M5 19h14" /></svg>
              <span>Download GLB</span>
            </button>
            <p>Generated locally in your browser. Nothing is uploaded.</p>
          </div>
        </aside>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <div class="loading-overlay" id="loading-overlay" hidden>
        <div class="spinner"></div>
        <span>Preparing your GLB…</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
